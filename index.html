<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>gn-math</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
    <div class="nav-left">
        <div class="logo">G.GUI Games</div>
    </div>

    <div class="nav-center">
        <input 
            type="text" 
            id="searchBar" 
            placeholder="Search zones..."
            oninput="filterZones()"
        >

        <select id="sortOptions" onchange="sortZones()">
            <option value="id">Sort by ID</option>
            <option value="name">Sort by Name</option>
            <option value="popular">Sort by Popularity</option>
        </select>
    </div>

    <div class="nav-right">
        <button class="nav-button" id="settings">Settings</button>
    </div>
</header>

<!-- FEATURED -->
<details id="featuredZonesWrapper" open>
    <summary class="section-title">Featured Zones</summary>
    <div class="zone-container" id="featuredZones"></div>
</details>

<!-- ALL ZONES -->
<details open>
    <summary class="section-title">All Zones</summary>
    <div id="container"></div>
</details>

<!-- ZONE VIEWER -->
<div id="zoneViewer">
    <div class="zone-header">
        <div>
            <h2 id="zoneName"></h2>
            <p>ID: <span id="zoneId"></span></p>
            <a id="zoneAuthor" target="_blank"></a>
        </div>

        <div class="zone-controls">
            <button onclick="fullscreenZone()">Fullscreen</button>
            <button onclick="aboutBlank()">About:Blank</button>
            <button onclick="downloadZone()">Download</button>
            <button onclick="closeZone()">Close</button>
        </div>
    </div>

    <iframe id="zoneFrame"></iframe>
</div>

<!-- POPUP -->
<div id="popupOverlay">
    <div class="popup-box">
        <h2 id="popupTitle"></h2>
        <div id="popupBody"></div>
        <button onclick="closePopup()">Close</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
