<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G.GUI Games</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/gh/gn-math/gn-math.github.io@main/gnmath.js"></script>
</head>

<body>

<header>
    <div class="header-content">
        <div class="logo">G.GUI Games/div>
        <button id="settings" class="neon-button small">Settings</button>
    </div>
</header>

<main>
    <details open>
        <summary>Featured Zones</summary>
        <div id="featuredZones" class="zone-container"></div>
    </details>

    <details open>
        <summary>All Zones</summary>
        <div id="container"></div>
    </details>
</main>

<div id="zoneViewer">
    <div class="zone-header">
        <h2 id="zoneName"></h2>
        <div class="zone-controls">
            <button class="neon-button small" onclick="fullscreenZone()">Fullscreen</button>
            <button class="neon-button small" onclick="aboutBlank()">New Tab</button>
            <button class="neon-button small" onclick="closeZone()">Close</button>
        </div>
    </div>
    <iframe id="zoneFrame"></iframe>
</div>

<script src="script.js"></script>
</body>
</html>
